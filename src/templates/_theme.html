{# Shared <head> partial: theme bootstrap + the one stylesheet.
   Include in <head> of every page. #}
<script>
  // Runs before the stylesheet so the page never flashes the wrong theme.
  (function () {
    var theme = 'light';
    try {
      var stored = localStorage.getItem('hb-theme');
      if (stored === 'dark' || stored === 'light') theme = stored;
    } catch (e) { /* private mode — fall through to light */ }
    document.documentElement.setAttribute('data-theme', theme);
  })();

  function hbToggleTheme() {
    var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem('hb-theme', next); } catch (e) {}
  }
</script>
<link rel="stylesheet" href="{{ url_for('static', filename='hb.css') }}?v={{ asset_v }}">

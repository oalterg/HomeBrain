<!DOCTYPE html>
<html data-theme="light">
<head>
    <meta charset="utf-8">
    <title>Installing {{ platform.product_name }}…</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% include '_theme.html' %}
</head>
<body>
    {% with floating=True %}{% include '_theme_toggle.html' %}{% endwith %}

    <div class="page-narrow" id="install-page">
        <div class="brand">Home<span>{{ platform.product_suffix }}</span></div>
        <h2 id="status-title">Installation in progress</h2>
        <p id="status-sub" class="tagline">Please do not unplug. This takes about 15 minutes.</p>

        <pre id="logs" class="install-log mt">Connecting to log stream…</pre>
    </div>

    <script>
        const BRAND_SUFFIX = {{ platform.product_suffix | tojson }};
        const handoverReady = {{ handover_ready|default('false')|lower }};

        let finished = false;
        const logsEl = document.getElementById('logs');

        const poller = setInterval(() => {
            if (finished) return;
            fetch('/api/logs/setup').then(r => {
                if (r.status === 401) { location.reload(); return null; }
                return r.text();
            }).then(t => {
                if (!t) return;
                logsEl.textContent = t;
                logsEl.scrollTop = logsEl.scrollHeight;
                if (t.includes('Deployment Complete - Ready for Handover')) {
                    finished = true;
                    clearInterval(poller);
                    setTimeout(fetchCredentials, 1000);
                }
            }).catch(() => { logsEl.textContent += '\n[Reconnecting…]'; });
        }, 3000);

        // The credentials file is written moments after the log line lands.
        function fetchCredentials(retries = 5) {
            fetch('/api/setup/credentials', { cache: 'no-store' })
                .then(res => {
                    if (!res.ok && retries > 0) {
                        setTimeout(() => fetchCredentials(retries - 1), 2000);
                        return null;
                    }
                    if (!res.ok) throw new Error('Credentials not found');
                    return res.json();
                })
                .then(data => { if (data) showSuccess(data); })
                .catch(e => {
                    console.error(e);
                    document.getElementById('install-page').innerHTML = `
                        <div class="brand">Home<span>${BRAND_SUFFIX}</span></div>
                        <h2>Installation finished</h2>
                        <p class="muted">The system is ready, but the credentials could not be loaded.</p>
                        <button class="btn-main" onclick="location.reload()">Go to login</button>`;
                });
        }

        function showSuccess(data) {
            const page = document.getElementById('install-page');
            page.innerHTML = `
                <div class="brand">Home<span>${BRAND_SUFFIX}</span></div>

                <div class="success-box mt">
                    <h2>Setup complete</h2>
                    <p>Your private cloud is ready. Save these credentials now.</p>

                    <div class="creds-block">
                        <span class="creds-label">Master username</span>
                        <span class="creds-value">admin</span>
                    </div>
                    <div class="creds-block">
                        <span class="creds-label">Master password</span>
                        <div class="creds-secret">${data.password}</div>
                    </div>

                    ${data.recovery_phrase ? `
                    <div class="creds-block">
                        <span class="creds-label">Recovery phrase</span>
                        <div class="creds-secret">${data.recovery_phrase}</div>
                        <p class="hint">Write these words down and keep them safe. They are your only way back in
                            if you forget the master password, and they are shown only once. They reset
                            administrative access; they do not unlock individual vault items.</p>
                    </div>` : ''}

                    <p class="small muted">This password grants full administrative access to your Dashboard,
                        Nextcloud, and Home Assistant.</p>

                    ${data.cloud_enabled ? `
                    <div class="activate-card">
                        <h3>Activate remote access</h3>
                        <p class="small">Register your device to enable remote access and finish setup.</p>
                        <div class="activate-row">
                            <input type="email" id="cloud-email" placeholder="Enter your email address" required>
                            <button onclick="registerCloud()" id="btn-cloud">Activate</button>
                        </div>
                        <p id="cloud-msg" class="activate-msg"></p>
                        <div id="confirmation-gate" class="confirm-gate">
                            <label class="check">
                                <input type="checkbox" id="chk-confirm" onchange="toggleLoginBtn()">
                                <span>I have received the email and set my password.</span>
                            </label>
                        </div>
                    </div>` : ''}

                    <div id="login-section" ${data.cloud_enabled ? 'style="display:none;"' : ''}>
                        <button class="btn-main stretch" id="btn-login-final" onclick="confirmAndLogin()"
                                ${data.cloud_enabled ? 'disabled' : ''}>
                            I have saved my password — log in
                        </button>
                    </div>
                </div>`;
        }

        function registerCloud() {
            const email = document.getElementById('cloud-email').value;
            const btn = document.getElementById('btn-cloud');
            const msg = document.getElementById('cloud-msg');

            if (!email.includes('@')) {
                msg.textContent = 'Please enter a valid email address.';
                msg.style.color = 'var(--danger)';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Sending…';
            document.getElementById('cloud-email').disabled = true;
            msg.textContent = '';

            fetch('/api/cloud/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        msg.textContent = data.message;
                        msg.style.color = 'var(--accent)';
                        btn.textContent = 'Activated';
                        document.getElementById('login-section').style.display = 'block';
                        document.getElementById('confirmation-gate').style.display = 'block';
                    } else {
                        msg.textContent = data.error || 'Failed to send.';
                        msg.style.color = 'var(--danger)';
                        btn.disabled = false;
                        btn.textContent = 'Send invite';
                    }
                })
                .catch(() => {
                    msg.textContent = 'Connection error.';
                    msg.style.color = 'var(--danger)';
                    btn.disabled = false;
                    document.getElementById('cloud-email').disabled = false;
                    btn.textContent = 'Send invite';
                });
        }

        function toggleLoginBtn() {
            document.getElementById('btn-login-final').disabled = !document.getElementById('chk-confirm').checked;
        }

        function confirmAndLogin() {
            fetch('/api/setup/cleanup_credentials', { method: 'POST' })
                .finally(() => { window.location.href = '/'; });
        }

        if (handoverReady) {
            finished = true;
            logsEl.textContent = 'Resuming session… retrieving credentials…';
            fetchCredentials();
        }
    </script>
</body>
</html>

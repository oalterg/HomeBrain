services:
  db:
    image: mariadb:11.4.9
    restart: unless-stopped
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    volumes:
      - db_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      interval: 15s
      timeout: 5s
      retries: 5
  
  redis:
    image: redis:8.4.0-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  nextcloud:
    image: nextcloud:32.0.3-apache
    restart: unless-stopped
    ports:
      - "${NEXTCLOUD_PORT:-8080}:80"
    volumes:
      - nextcloud_html:/var/www/html
      - ${NEXTCLOUD_DATA_DIR:-/var/www/html/data}:/var/www/html/data
    environment:
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=${NEXTCLOUD_TRUSTED_DOMAINS}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_HOST=db
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/status.php || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  homeassistant:
    image: homeassistant/home-assistant:2025.12.5
    restart: unless-stopped
    ports:
      - "${HA_PORT:-8123}:8123"
    volumes:
      - ha_config:/config
    environment:
      - TZ=Etc/UTC
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123"]
      interval: 30s
      timeout: 10s
      retries: 5

  newt:
    profiles:
      - pangolin
    image: fosrl/newt:1.8.1
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - PANGOLIN_ENDPOINT=${PANGOLIN_ENDPOINT}
      - NEWT_ID=${NEWT_ID}
      - NEWT_SECRET=${NEWT_SECRET}
  
  cloudflared-nc:
    profiles:
      - cloudflare-nc
    image: cloudflare/cloudflared:2025.11.1
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TOKEN_NC}
    depends_on:
      nextcloud:
        condition: service_healthy
  
  cloudflared-ha:
    profiles:
      - cloudflare-ha
    image: cloudflare/cloudflared:2025.11.1
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TOKEN_HA}
    depends_on:
      - homeassistant

  ollama:
    profiles:
      - ai
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
      - ./config/Modelfile:/Modelfile:ro
    environment:
      - OLLAMA_KEEP_ALIVE=24h # Prevent slow re-loads during sparse conversation
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

# OpenClaw Gateway (main service)
  openclaw-gateway:
    user: "0:0"
    profiles:
      - ai
    image: ghcr.io/openclaw/openclaw:latest  # Pulls latest official image
    restart: unless-stopped
    ports:
      - "18789:18789"  # OpenClaw UI on a free port
      - "18790:18790"  # Bridge port (optional)
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}  # From .env (generate with openssl rand -hex 32)
      - OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      - CLAUDE_AI_SESSION_KEY=${CLAUDE_AI_SESSION_KEY:-}  # Optional for Claude integration
      - CLAUDE_WEB_SESSION_KEY=${CLAUDE_WEB_SESSION_KEY:-}  # Optional
      - CLAUDE_WEB_COOKIE=${CLAUDE_WEB_COOKIE:-}  # Optional
      - OLLAMA_BASE_URL=http://ollama:11434  # Integrate with your existing Ollama
      - OLLAMA_API_KEY=ollama-local  # Dummy key for local Ollama
    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace
      - ./config/openclaw-default-config.json:/home/node/.openclaw/openclaw-default-config.json
    command: >
      sh -c "
        if [ ! -f /home/node/.openclaw/openclaw.json ]; then
          echo 'Initializing default OpenClaw configuration...';
          cp /home/node/.openclaw/openclaw-default-config.json /home/node/.openclaw/openclaw.json;
          chown 1000:1000 /home/node/.openclaw/openclaw.json;
        fi &&
        exec node dist/index.js gateway --bind lan --port 18789
      "
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      ollama:
        condition: service_healthy

  # OpenClaw CLI (for onboarding and management, run manually)
  openclaw-cli:
    user: "0:0"
    profiles:
      - ai
    image: ghcr.io/openclaw/openclaw:latest  # Same as gateway
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      - BROWSER=echo
      - CLAUDE_AI_SESSION_KEY=${CLAUDE_AI_SESSION_KEY:-}
      - CLAUDE_WEB_SESSION_KEY=${CLAUDE_WEB_SESSION_KEY:-}
      - CLAUDE_WEB_COOKIE=${CLAUDE_WEB_COOKIE:-}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_API_KEY=ollama-local
    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - openclaw-gateway
volumes:
  nextcloud_html:
  db_data:
  ha_config:
  redis_data:
  ollama_data:
  openclaw_config:
  openclaw_workspace:

services:
  db:
    image: mariadb:11.4.12
    restart: unless-stopped
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    volumes:
      - db_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      interval: 15s
      timeout: 5s
      retries: 5
  
  redis:
    image: redis:8.6.4-alpine
    restart: unless-stopped
    # Loopback-only publish: the manager (gunicorn on the host) uses Redis as
    # shared rate-limit storage — its 3 workers otherwise each count limits
    # separately in memory.
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  nextcloud:
    image: nextcloud:33.0.6-apache
    restart: unless-stopped
    ports:
      - "${NEXTCLOUD_PORT:-8080}:80"
    volumes:
      - nextcloud_html:/var/www/html
      - ${NEXTCLOUD_DATA_DIR:-/home/homebrain/nextcloud-data}:/var/www/html/data
    environment:
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=${NEXTCLOUD_TRUSTED_DOMAINS}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_HOST=db
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/status.php || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  homeassistant:
    image: homeassistant/home-assistant:2026.7.2
    restart: unless-stopped
    ports:
      - "${HA_PORT:-8123}:8123"
    volumes:
      - ha_config:/config
    environment:
      - TZ=Etc/UTC
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123"]
      interval: 30s
      timeout: 10s
      retries: 5

  caddy:
    # Always runs: provides local HTTPS access to Vault and Nextcloud so LAN
    # links work even when the tunnel is down.  In remote mode Pangolin
    # terminates TLS at the public edge; Caddy is the LAN fallback.
    image: caddy:2.11.4-alpine
    restart: unless-stopped
    ports:
      - "${VAULT_LOCAL_HTTPS_PORT:-8443}:8443"
      - "${NC_LOCAL_HTTPS_PORT:-8444}:8444"
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - VAULT_LAN_IP=${VAULT_LAN_IP:-127.0.0.2}
    depends_on:
      - vaultwarden
      - nextcloud
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      # Caddy serves TLS on :8443 with an internal CA. wget --no-check-certificate
      # accepts the self-signed leaf without trying to verify against the host's
      # CA bundle.
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://127.0.0.1:8443/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5

  vaultwarden:
    image: vaultwarden/server:${VAULTWARDEN_TAG:-1.36.0}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${VAULT_PORT:-8082}:80"
    volumes:
      - ${VAULT_DATA_DIR:-/home/homebrain/vault-data}:/data
    environment:
      - DOMAIN=${VAULT_DOMAIN:-http://localhost:8082}
      - DATABASE_URL=mysql://${VAULT_DB_USER}:${VAULT_DB_PASSWORD}@db/${VAULT_DB_NAME}
      - ADMIN_TOKEN=${VAULT_ADMIN_TOKEN}
      - SIGNUPS_ALLOWED=${VAULT_SIGNUPS_ALLOWED:-false}
      - SIGNUPS_VERIFY=false
      - INVITATIONS_ALLOWED=true
      - WEBSOCKET_ENABLED=true
      - PUSH_ENABLED=false
      - SENDS_ALLOWED=true
      - EMERGENCY_ACCESS_ALLOWED=true
      - LOG_LEVEL=warn
      - EXTENDED_LOGGING=true
      - SHOW_PASSWORD_HINT=false
      - ROCKET_WORKERS=2
      - ROCKET_PORT=80
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 5

  proton-bridge:
    # Profile-gated: only starts when the user has added a Proton account in
    # the dashboard (Connections → Email). Bridge exposes IMAP on :12143
    # and SMTP on :12025 on localhost; the email MCP server connects there.
    profiles:
      - proton-bridge
    image: shenxn/protonmail-bridge:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:12143:143"
      - "127.0.0.1:12025:25"
    volumes:
      - proton_bridge_data:/root
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  newt:
    profiles:
      - pangolin
    image: fosrl/newt:1.14.0
    restart: unless-stopped
    # No docker.sock mount: newt only used it for optional container
    # discovery in the Pangolin UI, and socket API access is root-equivalent
    # on the host ("ro" only protects the socket file, not the API). Tunnel
    # targets resolve via the compose network DNS.
    environment:
      - PANGOLIN_ENDPOINT=${PANGOLIN_ENDPOINT}
      - NEWT_ID=${NEWT_ID}
      - NEWT_SECRET=${NEWT_SECRET}
  
  cloudflared-nc:
    profiles:
      - cloudflare-nc
    image: cloudflare/cloudflared:2026.7.2
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TOKEN_NC}
    depends_on:
      nextcloud:
        condition: service_healthy
  
  cloudflared-ha:
    profiles:
      - cloudflare-ha
    image: cloudflare/cloudflared:2026.7.2
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TOKEN_HA}
    depends_on:
      - homeassistant

volumes:
  nextcloud_html:
  db_data:
  ha_config:
  redis_data:
  caddy_data:
  caddy_config:
  proton_bridge_data:
